<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css">
    <script src="popup.js" type="module" defer></script>
    <title>Dalennod Extension</title>
  </head>

  <body>
    <nav>
      <a href="http://localhost:41415" target="_blank">
          <img src="icons/dalennod-96.png" alt="dalennod" width="38" height="38" />
          <h3>Dalennod</h3>
      </a>
    </nav>
    <main>
      <div class="done-overlay-div" id="done-overlay-div"><span class="done-overlay-text" id="done-overlay-text"></span></div>
      <div class="centered">
        <span id="bkm-id" hidden></span>
        <div class="fieldinput">
            <label for="input-url" class="label-input">URL<span class="red-text">*</span></label>
            <textarea class="textarea-no-resize" id="input-url" placeholder="URL (required)" rows="1" required></textarea>
        </div>
        <div class="fieldinput">
            <label for="input-title" class="label-input">Title</label>
            <textarea class="textarea-no-resize" id="input-title" rows="1"></textarea>
        </div>
        <div class="fieldinput">
            <label for="input-note" class="label-input">Notes</label>
            <textarea id="input-note" rows="1" autofocus></textarea>
        </div>
        <div class="fieldinput">
            <label for="input-keywords" class="label-input">Keywords, to, search, bookmark</label>
            <textarea class="textarea-no-resize" id="input-keywords" rows="1"></textarea>
        </div>
        <div class="fieldinput">
            <label for="input-category" class="label-input">Category</label>
            <datalist id="categories-list"></datalist>
            <input type="text" id="input-category" list="categories-list" autocomplete="off" />
        </div>
        <div class="pad-like-p" id="radio-btn-archive">
          Archive?:
          <input type="checkbox" name="input-archive" id="input-archive" title="Check to archive" />
          <label for="input-archive" id="input-archive-label" title="Check to archive">No</label>
        </div>
        <div class="red-text pad-like-p">* required</div>
        <div class="pad-like-p">
          <div class="center-text">
            <button id="button-add-req">Create</button>
            <button id="button-update-req" hidden>Update</button>
            <button id="button-remove-req" hidden>Remove</button>
            <span id="checkmark" hidden>&check;</span>
          </div>
          <span tabindex="-1" class="red-text" id="archive-warn" hidden>WARN: Archiving may take few seconds to minutes. It's safe to navigate away in the meantime.</span>
        </div>
      </div>
    </main>
  </body>
</html>
